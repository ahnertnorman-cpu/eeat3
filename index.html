function wdays(){const n=new Date(),dw=n.getDay()===0?6:n.getDay()-1;return Array.from({length:7},(_,i)=>{const d=new Date(n);d.setDate(n.getDate()-dw+i);return d.toISOString().slice(0,10);});}
function l30(){return Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return d.toISOString().slice(0,10);});}
function getWeekStart(off=0){const n=new Date(),dw=n.getDay()===0?6:n.getDay()-1;const m=new Date(n);m.setDate(n.getDate()-dw+off*7);return m.toISOString().slice(0,10);}
function getWeekDaysFrom(s){const m=new Date(s+"T12:00:00");return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d.toISOString().slice(0,10);});}
function getISOWeek(d){const j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function cm(g){let kc=0,pr=0,kh=0,ft=0,fb=0;Object.entries(g||{}).forEach(([id,v])=>{const it=IMAP[id];if(!it||!v)return;kc+=v/100*it.kcal100;pr+=v/100*it.prot100;kh+=v/100*it.kh100;ft+=v/100*it.fett100;fb+=v/100*it.fib100;});return{kcal:Math.round(kc),protein:Math.round(pr),kh:Math.round(kh),fett:Math.round(ft),fiber:Math.round(fb)};}
function ccm(cid,g){const c=CMAP[cid];let kc=0,pr=0;c.items.forEach(i=>{const v=g[i.id]||0;kc+=v/100*i.kcal100;pr+=v/100*i.prot100;});return{kcal:Math.round(kc),prot:Math.round(pr)};}
function ccmProt(g){let kc=0,pr=0;PROTEIN_CATIDS.forEach(cid=>{CMAP[cid].items.forEach(i=>{const v=g[i.id]||0;kc+=v/100*i.kcal100;pr+=v/100*i.prot100;});});return{kcal:Math.round(kc),prot:Math.round(pr)};}
function cmMic(g){const r={};MIC_KEYS.forEach(k=>r[k]=0);Object.entries(g||{}).forEach(([id,v])=>{if(!v||!MICS[id])return;MIC_KEYS.forEach((k,i)=>{r[k]+=v/100*MICS[id][i];});});return r;}
function dayPortionFrac(cat,dg){return cat.items.reduce((s,i)=>s+(dg[i.id]||0)/(i.portionMin||100),0);}
function catPortions(cat,days){return days.reduce((s,d)=>s+Math.floor(dayPortionFrac(cat,allDay[d]||{})),0);}

// Show all 10 micronutrients sorted ascending by coverage %
function buildMicAnalysis(days,minDays=3){
  const valid=days.filter(d=>allDay[d]&&Object.keys(allDay[d]).length>0);
  if(valid.length<minDays)return `<div class="wcard"><div class="wtit">🔬 Mikronährstoffe</div><div style="font-size:12px;color:#aaa;font-style:italic">Noch nicht genug Tage erfasst (mind. ${minDays}).</div></div>`;
  const avg={};MIC_KEYS.forEach(k=>avg[k]=0);
  valid.forEach(d=>{const m=cmMic(allDay[d]||{});MIC_KEYS.forEach(k=>avg[k]+=m[k]/valid.length);});
  const sorted=MIC_KEYS.map(k=>({k,pct:Math.min(avg[k]/MIC_GOALS[k].goal,1.5)})).sort((a,b)=>a.pct-b.pct);
  let h=`<div class="wcard"><div class="wtit">🔬 Mikronährstoffe <span style="font-weight:500;color:#bbb;letter-spacing:0;text-transform:none">(Ø ${valid.length} Tage)</span></div>`;
  sorted.forEach(({k,pct})=>{
    const g=MIC_GOALS[k];
    const bar=Math.round(Math.min(pct,1)*100);
    const ok=pct>=1;
    const col=pct<0.5?"#b02010":pct<0.75?"#9a6000":pct<1?"#7a7000":"#1a7a40";
    const bgCol=pct<0.5?"#fff4f3":pct<0.75?"#fff8f0":pct<1?"#fffde8":"#f0faf4";
    const fillW=Math.min(bar,100);
    const fx=MIC_FX[k];
    const fxText=ok?fx[1]:fx[0];
    const fxCol=ok?"#1a6030":"#666";
    const fxIcon=ok?"✅":"⚠️";
    h+=`<div style="background:${bgCol};border:2px solid ${col}33;border-radius:11px;padding:10px 12px;margin-bottom:8px;box-shadow:2px 2px 0 ${col}22">
      <div class="mic-row" style="margin-bottom:5px">
        <div class="mic-icon">${g.icon}</div>
        <div class="mic-body">
          <div class="mic-top">
            <span class="mic-name" style="color:${col}">${g.lbl}</span>
            <span class="mic-pct" style="color:${col}">${bar}%${ok?" ✓":""}</span>
          </div>
          <div class="mic-track" style="border-color:${col}88">
            <div class="mic-fill" style="width:${fillW}%;background:${col}"></div>
          </div>
        </div>
      </div>
      <div style="font-size:11px;color:${fxCol};line-height:1.5;padding-left:28px">${fxIcon} <em>${fxText}</em></div>
      ${!ok?`<div style="font-size:10px;color:#888;margin-top:5px;padding-left:28px;font-weight:700">👉 Mehr: ${MIC_TIPS[k]}</div>`:""}
    </div>`;
  });
  return h+`</div>`;
}

// ── WEEK MACRO CARD ───────────────────────────────────────────────────────────
function buildWeekMacroCard(days){
  const tots=days.map(d=>cm(allDay[d]||{}));
  const valid=tots.filter(t=>t.kcal>0);
  if(!valid.length)return "";
  const avg={};MDEFS.forEach(d=>{avg[d.k]=Math.round(valid.reduce((s,t)=>s+t[d.k],0)/valid.length);});
  const kp=Math.min(avg.kcal/GOALS.kcal*100,100),kdone=kp>=100;
  let h=`<div class="wcard"><div class="wtit">⌀ Makros <span style="font-weight:500;color:#bbb;text-transform:none;letter-spacing:0">(${valid.length} Tage)</span></div>
  <div class="mac-top"><div><span style="font-size:22px;font-weight:900;color:${kdone?"#c49a00":"#1a1a1a"}">${avg.kcal}</span> <span class="mac-kcal-goal">/ ${GOALS.kcal} kcal</span></div>
  <span style="font-size:11px;font-weight:700;color:${kdone?"#c49a00":"#bbb"}">${kdone?"✅":Math.round(kp)+"%"}</span></div>
  <div class="mac-kcal-bar" style="margin-bottom:12px"><div class="mac-kcal-fill" style="width:${kp}%"></div></div>
  <div class="mac-grid">`;
  MDEFS.filter(d=>d.k!=="kcal").forEach(d=>{
    const v=avg[d.k],gv=GOALS[d.k],pp=Math.min(v/gv*100,100),dn=pp>=100;
    h+=`<div><div class="mac-lbl"><span>${d.lbl}</span><b style="color:${dn?d.c:"#1a1a1a"}">${v}<span style="font-size:9px;font-weight:400;color:#aaa"> /${gv}${d.u}</span></b></div>
      <div class="mac-bar"><div class="mac-fill" style="width:${pp}%;background:${d.c}"></div></div></div>`;
  });
  return h+`</div></div>`;
}

// ── PERSIST ───────────────────────────────────────────────────────────────────
function save(){try{localStorage.setItem(dk(viewDay),JSON.stringify(grams));}catch(e){}allDay[viewDay]=grams;}
function loadDay(d){try{const r=localStorage.getItem(dk(d));return r?JSON.parse(r):{};} catch(e){return {};}}
function load(){l30().forEach(d=>{allDay[d]=loadDay(d);});grams=loadDay(viewDay);allDay[viewDay]=grams;}
function hintSeen(){try{return!!localStorage.getItem("ern-h3");}catch(e){return false;}}
function closeHint(){try{localStorage.setItem("ern-h3","1");}catch(e){}const b=document.getElementById("hb");if(b)b.remove();}

// ── DAY NAV ───────────────────────────────────────────────────────────────────
function shiftDay(n){
  const d=new Date(viewDay+"T12:00:00");d.setDate(d.getDate()+n);
  const nd=d.toISOString().slice(0,10);
  if(nd>ts())return;
  viewDay=nd;grams=loadDay(viewDay);allDay[viewDay]=grams;
  updateDayHeader();renderContent();
}
function goToday(){viewDay=ts();grams=loadDay(viewDay);allDay[viewDay]=grams;updateDayHeader();renderContent();}
function updateDayHeader(){
  const isToday=viewDay===ts();
  const d=new Date(viewDay+"T12:00:00");
  document.getElementById("dlbl").textContent=isToday?"Heute – "+d.toLocaleDateString("de-DE",{day:"numeric",month:"long"}):d.toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"long"});
  document.getElementById("todaybtn").style.display=isToday?"none":"inline-block";
  document.getElementById("nextday").style.opacity=isToday?"0.3":"1";
  document.getElementById("nextday").style.pointerEvents=isToday?"none":"auto";
  updMacros();
}

// ── MACRO HEADER ──────────────────────────────────────────────────────────────
function initMacros(){
  const m=cm(grams),kc=m.kcal,g=GOALS.kcal,p=Math.min(kc/g*100,100),done=p>=100;
  let h=`<div class="mac-top">
    <div><span class="mac-kcal" id="mvkcal" style="color:${done?"#c49a00":"#1a1a1a"}">${kc}</span> <span class="mac-kcal-goal">/ ${g} kcal</span></div>
    <span style="font-size:11px;font-weight:700;color:${done?"#c49a00":"#bbb"}">${done?"✅ Ziel!":Math.round(p)+"%"}</span>
  </div>
  <div class="mac-kcal-bar"><div class="mac-kcal-fill" id="mfkcal" style="width:${p}%"></div></div>
  <div class="mac-grid">`;
  MDEFS.filter(d=>d.k!=="kcal").forEach(d=>{
    const v=m[d.k],gv=GOALS[d.k],pp=Math.min(v/gv*100,100),dn=pp>=100;
    h+=`<div><div class="mac-lbl"><span>${d.lbl}</span><b id="mv${d.k}" style="color:${dn?d.c:"#1a1a1a"}">${v}<span style="font-size:9px;font-weight:400;color:#aaa"> /${gv}${d.u}</span></b></div>
      <div class="mac-bar"><div class="mac-fill" id="mf${d.k}" style="width:${pp}%;background:${d.c}"></div></div></div>`;
  });
  document.getElementById("macwrap").innerHTML=h+`</div>`;
}
function updMacros(){
  const m=cm(grams),kc=m.kcal,g=GOALS.kcal,p=Math.min(kc/g*100,100),done=p>=100;
  const ve=document.getElementById("mvkcal"),be=document.getElementById("mfkcal");
  if(ve){ve.textContent=kc;ve.style.color=done?"#c49a00":"#1a1a1a";}
  if(be)be.style.width=p+"%";
  MDEFS.filter(d=>d.k!=="kcal").forEach(d=>{
    const v=m[d.k],gv=GOALS[d.k],pp=Math.min(v/gv*100,100),dn=pp>=100;
    const e=document.getElementById("mv"+d.k),f=document.getElementById("mf"+d.k);
    if(e){e.innerHTML=`${v}<span style="font-size:9px;font-weight:400;color:#aaa"> /${gv}${d.u}</span>`;e.style.color=dn?d.c:"#1a1a1a";}
    if(f)f.style.width=pp+"%";
  });
}

function initTabs(){
  document.getElementById("tabs").innerHTML=[["today","📅 Tag"],["week","📊 Woche"],["month","📆 Monat"]].map(([t,l])=>
    `<button class="tbtn${tab===t?" on":""}" data-t="${t}">${l}</button>`).join("");
}

// ── TODAY ─────────────────────────────────────────────────────────────────────
function iRowHTML(it,accent,ix){
  const g=grams[it.id]||0,ac=g>0;
  const ck=ac?Math.round(g/100*it.kcal100):0,cp=ac?Math.round(g/100*it.prot100*10)/10:0;
  const isRaw=it.name.includes('roh')||it.name.includes('trocken');
  const u=it.unit||(isRaw?"g roh":"g");
  return `<div class="irow" id="ir${it.id}" style="${ix>0?"border-top:1.5px solid #ede9e2":""}${ac?";background:"+accent+"12":""}">
    <span class="iemoji">${it.emoji}</span>
    <div class="iname"><div class="ilbl" id="il${it.id}" style="color:${ac?"#1a1a1a":"#bbb"}">${it.name}</div></div>
    <div class="icalc" id="ic${it.id}" style="${ac?"display:block":""}">
      <div class="ick">${ck} kcal</div><div class="icp">${cp}g P</div>
    </div>
    <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
      <input class="iinp" type="number" inputmode="decimal" value="${g||""}" placeholder="${it.hint}"
        data-iid="${it.id}" data-cid="${it.catId}" style="border-color:${ac?accent:"#ccc"}"/>
      <span class="iunit" style="font-size:${isRaw||it.unit?"9px":"10px"}">${u}</span>
    </div>
  </div>`;
}

function buildToday(){
  let h=hintSeen()?"":
    `<div class="hintbanner" id="hb"><button class="hintclose" onclick="closeHint()">✕</button><strong>Als App speichern:</strong> In Safari öffnen → Teilen (□↑) → „Zum Home-Bildschirm"</div>`;

  // ── Proteinquellen (combined) ──
  const protCats=PROTEIN_CATIDS.map(id=>CMAP[id]);
  const protHasAny=protCats.some(c=>c.items.some(i=>grams[i.id]>0));
  const protM=ccmProt(grams);
  const opProt=!!expanded[PROT_ID];
  h+=`<div class="cc" id="cc${PROT_ID}" style="border-color:${protHasAny?PROT_ACCENT:"#1a1a1a"};box-shadow:4px 4px 0 ${protHasAny?PROT_ACCENT:"#1a1a1a"}">
    <div class="ch" id="ch${PROT_ID}" data-cid="${PROT_ID}" style="background:${protHasAny?PROT_ACCENT+"15":"transparent"}">
      <span class="cemoji">💪</span><span class="cname">Proteinquellen</span>
      <span class="csum" id="cs${PROT_ID}" style="color:${PROT_ACCENT};${protM.kcal>0?"":"display:none"}">${protM.kcal} kcal · ${protM.prot}g P</span>
      <span class="carr" id="ca${PROT_ID}" style="${opProt?"transform:rotate(180deg)":""}">▾</span>
    </div>
    <div class="citems${opProt?" open":""}" id="ci${PROT_ID}">`;
  protCats.forEach(cat=>{
    h+=`<div class="sub-hdr">${cat.emoji} ${cat.label}</div>`;
    cat.items.forEach((it,ix)=>{h+=iRowHTML(it,PROT_ACCENT,ix);});
  });
  h+=`</div></div>`;

  // ── All other categories ──
  CATS.filter(c=>!PROTEIN_CATIDS.includes(c.id)).forEach(cat=>{
    const m=ccm(cat.id,grams),ha=cat.items.some(i=>grams[i.id]>0),op=!!expanded[cat.id];
    h+=`<div class="cc" id="cc${cat.id}" style="border-color:${ha?cat.accent:"#1a1a1a"};box-shadow:4px 4px 0 ${ha?cat.accent:"#1a1a1a"}">
    <div class="ch" id="ch${cat.id}" data-cid="${cat.id}" style="background:${ha?cat.accent+"15":"transparent"}">
      <span class="cemoji">${cat.emoji}</span><span class="cname">${cat.label}</span>
      <span class="csum" id="cs${cat.id}" style="color:${cat.accent};${m.kcal>0?"":"display:none"}">${m.kcal} kcal · ${m.prot}g P</span>
      <span class="carr" id="ca${cat.id}" style="${op?"transform:rotate(180deg)":""}">▾</span>
    </div>
    <div class="citems${op?" open":""}" id="ci${cat.id}">`;
    cat.items.forEach((it,ix)=>{h+=iRowHTML(it,cat.accent,ix);});
    h+=`</div></div>`;
  });
  return h;
}

function updRow(iid,cid){
  const it=IMAP[iid],g=grams[iid]||0,ac=g>0;
  const ck=ac?Math.round(g/100*it.kcal100):0,cp=ac?Math.round(g/100*it.prot100*10)/10:0;
  const dot=document.getElementById("il"+iid),calc=document.getElementById("ic"+iid);
  const inp=document.querySelector(`[data-iid="${iid}"]`),row=document.getElementById("ir"+iid);
  const isProteinCat=PROTEIN_CATIDS.includes(cid);
  const accent=isProteinCat?PROT_ACCENT:(CMAP[cid]?.accent||"#aaa");
  if(dot)dot.style.color=ac?"#1a1a1a":"#bbb";
  if(calc){calc.style.display=ac?"block":"none";calc.innerHTML=`<div class="ick">${ck} kcal</div><div class="icp">${cp}g P</div>`;}
  if(inp)inp.style.borderColor=ac?accent:"#ccc";
  if(row)row.style.background=ac?accent+"12":"transparent";
  if(isProteinCat){
    const pm=ccmProt(grams),ha=PROTEIN_CATIDS.some(id=>CMAP[id].items.some(i=>grams[i.id]>0));
    const cs=document.getElementById("cs"+PROT_ID),ch=document.getElementById("ch"+PROT_ID),cc=document.getElementById("cc"+PROT_ID);
    if(cs){cs.textContent=pm.kcal>0?pm.kcal+" kcal · "+pm.prot+"g P":"";cs.style.display=pm.kcal>0?"":"none";}
    if(ch)ch.style.background=ha?PROT_ACCENT+"15":"transparent";
    if(cc){cc.style.borderColor=ha?PROT_ACCENT:"#1a1a1a";cc.style.boxShadow=`4px 4px 0 ${ha?PROT_ACCENT:"#1a1a1a"}`;}
  } else {
    const cat=CMAP[cid];if(!cat)return;
    const m=ccm(cid,grams),ha=cat.items.some(i=>grams[i.id]>0);
    const cs=document.getElementById("cs"+cid),ch=document.getElementById("ch"+cid),cc=document.getElementById("cc"+cid);
    if(cs){cs.textContent=m.kcal>0?m.kcal+" kcal · "+m.prot+"g P":"";cs.style.display=m.kcal>0?"":"none";}
    if(ch)ch.style.background=ha?cat.accent+"15":"transparent";
    if(cc){cc.style.borderColor=ha?cat.accent:"#1a1a1a";cc.style.boxShadow=`4px 4px 0 ${ha?cat.accent:"#1a1a1a"}`;}
  }
}

// ── WEEK ──────────────────────────────────────────────────────────────────────
function buildWeek(){
  const days=wdays(),td=ts(),tots=days.map(d=>cm(allDay[d]||{}));
  let h=`<div style="font-size:11px;color:#999;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:13px">${fd(days[0])} – ${fd(days[6])}</div>`;
  h+=buildWeekMacroCard(days);
  h+=buildMicAnalysis(days,3);
  h+=`<div class="wcard"><div class="wtit">Kalorien pro Tag</div><div class="bchart">`;
  tots.forEach((t,i)=>{
    const p=Math.min(t.kcal/GOALS.kcal,1),isT=days[i]===td,ht=Math.max(p*50,t.kcal>0?5:0);
    h+=`<div class="bcol"><div class="bnum" style="color:${isT?"#c49a00":"#ccc"}">${t.kcal>0?t.kcal:""}</div>
      <div class="bbar" style="height:${ht}px;background:${isT?"#d4a800":t.kcal>0?"#1a1a1a":"#ede9e2"}"></div>
      <div class="blbl${isT?" td":""}">${DNM[i]}</div></div>`;
  });
  h+=`</div></div><div class="wcard"><div class="wtit">Wochenziele</div>`;
  CATS.forEach(cat=>{
    const portions=catPortions(cat,days);
    const pct=Math.min(cat.weekMax>0?portions/cat.weekMax*100:0,100);
    const minPct=cat.weekMax>0?cat.weekMin/cat.weekMax*100:0;
    let color;
    if(cat.isTreat){color=portions>cat.weekMax?"#c04020":"#888";}
    else{const ok=portions>=cat.weekMin&&portions<=cat.weekMax,over=portions>cat.weekMax;color=over?"#c04020":ok?"#1a7a40":portions>=cat.weekMin*0.5?"#8a7000":"#aa2020";}
    h+=`<div class="wt-row"><div class="wt-head">
      <span class="wt-emoji">${cat.emoji}</span><span class="wt-name">${cat.label}</span>
      <span class="wt-num" style="color:${color}">${portions}</span>
      <span class="wt-goal">${cat.isTreat?"max "+cat.weekMax+" P":cat.weekMin===cat.weekMax?cat.weekMin+" Portionen":cat.weekMin+"–"+cat.weekMax+" Portionen"}</span>
    </div>
    <div class="wt-track">
      <div class="wt-fill" style="width:${pct}%;background:${color}"></div>
      ${cat.weekMin>0?`<div class="wt-min-marker" style="left:${minPct}%"></div>`:""}
    </div><div class="ddots">`;
    days.forEach((d,i)=>{
      const frac=dayPortionFrac(cat,allDay[d]||{});
      const dc=frac>=1?cat.accent:frac>0?cat.accent+"66":"#ede9e2";
      h+=`<div class="ddw"><div class="dd" style="background:${dc};border-color:${d===td?"#1a1a1a":"transparent"}"></div><div class="ddl${d===td?" td":""}">${DNM[i]}</div></div>`;
    });
    h+=`</div></div>`;
  });
  return h+`</div>`;
}

// ── MONTH ─────────────────────────────────────────────────────────────────────
function buildMonth(){
  const weeks=[];
  for(let w=0;w<5;w++){const s=getWeekStart(-4+w),days=getWeekDaysFrom(s);weeks.push({days,label:w===4?"diese Wo.":"KW "+getISOWeek(new Date(s+"T12:00:00")),isCurrent:w===4});}
  const td=ts(),dkc=l30().map(d=>cm(allDay[d]||{}).kcal),mk=Math.max(...dkc,GOALS.kcal);
  let h=`<div class="slbl">Letzte 5 Wochen</div>`;
  h+=buildMicAnalysis(l30(),7);
  h+=`<div class="mcard"><div class="mctit">Kalorien-Verlauf (30 Tage)</div><div class="kstrip">`;
  dkc.forEach((k,i)=>{const p=Math.min(k/mk,1),isT=l30()[i]===td,ht=Math.max(p*44,k>0?3:1);h+=`<div class="kbar" style="height:${ht}px;background:${isT?"#d4a800":k>0?"#1a1a1a":"#ede9e2"}"></div>`;});
  h+=`</div><div class="slabs"><span class="slab">vor 30 Tagen</span><span class="slab" style="color:#1a1a1a">heute</span></div></div>`;
  h+=`<div class="mcard"><div class="mctit">Wochenziele — Überblick</div><div class="month-week-hdrs">`;
  weeks.forEach(w=>{h+=`<div class="mw-hdr">${w.label}</div>`;});h+=`</div>`;
  CATS.forEach(cat=>{
    h+=`<div class="month-row"><div class="month-cat-label" style="font-size:10px"><span>${cat.emoji}</span><span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${cat.label}</span></div><div class="month-weeks">`;
    weeks.forEach(w=>{
      const portions=catPortions(cat,w.days);
      const met=!cat.isTreat&&portions>=cat.weekMin,half=!cat.isTreat&&portions>=cat.weekMin*0.5&&!met,over=cat.isTreat&&portions>cat.weekMax,none=portions===0;
      const bg=met?"#d0f0dc":over?"#fde0e0":half?"#fdf0c0":none?"#ede9e2":"#d0f0dc";
      const tc=met?"#1a6030":over?"#aa2020":half?"#7a6000":"#bbb";
      h+=`<div class="mw-cell" style="background:${bg};color:${tc};border:${w.isCurrent?`2.5px solid ${cat.accent}`:"1.5px solid #ccc"}">${none?"–":portions}</div>`;
    });
    h+=`</div></div>`;
  });
  h+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:2px solid #ede9e2">
    ${[["#d0f0dc","#1a6030","Ziel ✓"],["#fdf0c0","#7a6000","Halb"],["#ede9e2","#bbb","Verpasst"],["#fde0e0","#aa2020","Zu viel"]].map(([bg,tc,lbl])=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:${bg}"></div><span style="font-size:10px;color:#555;font-weight:700">${lbl}</span></div>`).join("")}
  </div></div>`;
  return h;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function attachHandlers(){
  // Category toggle — handle protein separately
  document.querySelectorAll(".ch").forEach(el=>{
    el.addEventListener("click",()=>{
      const cid=el.dataset.cid;
      expanded[cid]=!expanded[cid];
      const ci=document.getElementById("ci"+cid);
      const ca=document.getElementById("ca"+cid);
      if(ci)ci.classList.toggle("open",!!expanded[cid]);
      if(ca)ca.style.transform=expanded[cid]?"rotate(180deg)":"rotate(0deg)";
    });
  });
  // Input changes
  document.getElementById("content").addEventListener("input",e=>{
    const inp=e.target.closest(".iinp");if(!inp)return;
    const iid=inp.dataset.iid,cid=inp.dataset.cid;
    const v=parseFloat(inp.value);
    if(v>0)grams[iid]=v;else delete grams[iid];
    save();updRow(iid,cid);updMacros();
  });
}

function renderContent(){
  const el=document.getElementById("content");
  if(tab==="today")el.innerHTML=buildToday();
  else if(tab==="week")el.innerHTML=buildWeek();
  else el.innerHTML=buildMonth();
  attachHandlers();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
load();updateDayHeader();initMacros();initTabs();renderContent();
document.getElementById("prevday").addEventListener("click",()=>shiftDay(-1));
document.getElementById("nextday").addEventListener("click",()=>shiftDay(1));
document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest(".tbtn");if(!b)return;
  tab=b.dataset.t;
  document.querySelectorAll(".tbtn").forEach(x=>x.classList.toggle("on",x.dataset.t===tab));
  renderContent();
});
</script>
</body>
</html>
